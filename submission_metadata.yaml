# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid semantic & heuristic candidate ranking pipeline processing 100,000 candidate profiles against a Senior AI Engineer JD on a CPU. First, candidates are ingested and compiled into a single unified summary text representation. A global TF-IDF vectorizer (with unigrams and bigrams, min_df=2, max_features=80,000) generates lexical matches against a query of target keywords. Then, a pre-filtering stage selects the top 30,000 candidates based on a weighted combination of lexical, NLP domain, skill depth, title alignment, production fit, experience, company profile, and engagement scores (with a high-recall fallback to force-include outstanding candidates in individual categories). Next, dense embeddings are generated for the pre-filtered candidates and 5 specific queries (the Job Description and 4 expansion queries targeting production ML, scale, startup experience, and retrieval indexing) using a local SentenceTransformer model (all-MiniLM-L6-v2). Cosine similarities are computed using a FAISS Inner Product index, aggregating max and mean query similarity. The final score is a weighted combination of semantic similarity (28%), NLP/IR keywords (15%), lexical matching (13%), skill depth (12%), production signals (10%), title alignment (7%), experience (6%), company profile (4%), evaluation metrics (2.5%), location (1.5%), and notice period (1%). Multiplicative multipliers scale the scores using a candidate engagement score and a honeypot penalty (which checks for stated vs derived experience gaps > 4.5 years, advanced skills with zero months duration, and domain keyword mismatch). Conditional demotions are applied to non-relevant titles (0.35x), low NLP signal (0.78x), and junior candidates with low semantic match (0.70x). Deterministic tie-breaking sorts the top 100 candidates by scores, semantic score, lexical score, behavior score, and candidate ID. Grounded semicolon-delimited justifications under 300 characters are generated using template extractors verified against the candidate's actual profile details.
